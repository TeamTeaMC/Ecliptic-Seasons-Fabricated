name: Auto Publish on CurseForge when Update

on:
  workflow_dispatch:
  push:
    paths:
      - 'gradle.properties'

env:
  MINECRAFT_VERSION: 26.1
  RELEASE_TYPE: beta
  CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_APITOKEN }}

permissions:
  contents: write

jobs:
  check-version-change:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.diff.outputs.changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # IMPORTANT: Allows access to HEAD~1

      - name: Get current mod_version
        id: current
        run: |
          version=$(grep "^mod_version=" gradle.properties | cut -d= -f2)
          echo "Current mod_version: $version"
          echo "current_version=$version" >> "$GITHUB_OUTPUT"

      - name: Get previous mod_version from git
        id: previous
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            prev_version=$(git show HEAD~1:gradle.properties | grep "^mod_version=" | cut -d= -f2)
          else
            prev_version=""
          fi
          echo "Previous mod_version: $prev_version"
          echo "previous_version=$prev_version" >> "$GITHUB_OUTPUT"

      - name: Compare mod_version
        id: diff
        run: |
          if [ "${{ steps.current.outputs.current_version }}" != "${{ steps.previous.outputs.previous_version }}" ]; then
            echo "mod_version changed"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No mod_version change"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version-change
    if: needs.check-version-change.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
#    environment: curseforge_apiToken
    steps:
      - name: Check CURSEFORGE_APITOKEN Length
        run: |
          SECRET_LENGTH=$(echo -n "${{ secrets.CURSEFORGE_APITOKEN }}" | wc -m)
          echo "CURSEFORGE_APITOKEN length: $SECRET_LENGTH"
          if [ "$SECRET_LENGTH" -eq 0 ]; then
            echo "CURSEFORGE_APITOKEN is empty!"
            exit 1
          fi

      - name: Check Environment Variables
        run: env

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "microsoft"
          java-version: 25

      - name: Make Gradle Wrapper Executable
        if: ${{ runner.os != 'Windows' }}
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build

      - name: Set Release Name Environment Variable
        id: set_release_name
        run: |
          RELEASE_NAME=$(basename $(ls build/libs/*.jar | grep -v sources))
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_ENV

      - name: Publish (CurseForge)
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: 1514738
          curseforge-token: "${{ env.CURSEFORGE_TOKEN }}"
          version-type: "${{ env.RELEASE_TYPE }}"
          changelog-file: changelog.md
          loaders: fabric
          game-versions: |
            [26.1,26.2)
          dependencies: ""
          name: "${{env.RELEASE_NAME}}"
          files: |
            build/libs/${{ env.RELEASE_NAME }}
